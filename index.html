<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAREK Tickets - نظام إدارة التذاكر الذكي | النسخة المستقرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --secondary: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --dark: #1A1A2E;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 0.75rem;
        }

        body {
            font-family: 'Cairo', 'Tajawal', system-ui, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dark) 0%, #0f0f23 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-lg);
            border-bottom: 3px solid var(--primary);
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo p {
            font-size: 0.8rem;
            color: var(--gray-300);
        }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: var(--radius);
            text-align: center;
        }

        /* Navigation */
        .nav {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
            padding: 0 2rem;
        }

        .nav-btn {
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-500);
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .nav-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Main Content */
        .main {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .tab {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.5rem;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--gray-700);
        }

        input, select, textarea {
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

        /* Transaction Type Selector */
        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .type-option {
            padding: 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option.active {
            border-color: var(--primary);
            background: rgba(124,58,237,0.05);
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--gray-50);
            padding: 0.8rem;
            text-align: right;
            font-weight: 600;
            border-bottom: 1px solid var(--gray-200);
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--gray-200);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-ticket { background: #dcfce7; color: #166534; }
        .badge-fine { background: #fed7aa; color: #9a3412; }
        .badge-payment { background: #dbeafe; color: #1e40af; }
        .badge-cancel { background: #fee2e2; color: #991b1b; }

        /* Summary */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .summary-item {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: white;
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            padding: 1.5rem;
        }

        /* Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            border-right: 4px solid var(--primary);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #ccc; }
            .print-header { text-align: center; margin-bottom: 2rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header no-print">
    <div class="header-content">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-ticket-alt"></i></div>
            <div><h1>TAREK Tickets</h1><p>نظام إدارة التذاكر الذكي</p></div>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalCompanies">0</div><div>شركة</div></div>
            <div class="stat-card"><div class="stat-number" id="totalTransactions">0</div><div>عملية</div></div>
            <div class="stat-card"><div class="stat-number" id="totalBalance">0 د</div><div>إجمالي الرصيد</div></div>
        </div>
    </div>
</header>

<nav class="nav no-print">
    <div class="nav-container">
        <button class="nav-btn active" data-tab="add"><i class="fas fa-plus-circle"></i> إضافة عملية</button>
        <button class="nav-btn" data-tab="report"><i class="fas fa-chart-line"></i> كشف الحساب</button>
        <button class="nav-btn" data-tab="manage"><i class="fas fa-cogs"></i> إدارة العمليات</button>
    </div>
</nav>

<main class="main">
    <!-- Tab 1: Add Transaction -->
    <div class="tab active" id="tab-add">
        <div class="card">
            <div class="card-header"><i class="fas fa-plus-circle"></i> إضافة عملية جديدة</div>
            <div class="card-body">
                <div class="form-grid">
                    <div>
                        <div class="form-group">
                            <button class="btn btn-primary" id="openCompanyModalBtn"><i class="fas fa-building"></i> إضافة شركة جديدة</button>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-building"></i> الشركة</label>
                            <select id="companySelect" class="company-select"></select>
                        </div>
                        <div id="companyInfoBox" style="display: none; background: var(--gray-50); padding: 0.8rem; border-radius: var(--radius); margin-top: 0.5rem;">
                            <strong id="selectedCompanyName"></strong><br>
                            الرصيد الحالي: <span id="selectedCompanyBalance"></span>
                        </div>
                        <div class="form-group">
                            <label>نوع العملية</label>
                            <div class="type-selector">
                                <div class="type-option active" data-type="ticket"><i class="fas fa-ticket-alt"></i><br>تذكرة</div>
                                <div class="type-option" data-type="fine"><i class="fas fa-exclamation-triangle"></i><br>غرامة</div>
                                <div class="type-option" data-type="payment"><i class="fas fa-hand-holding-usd"></i><br>تسليم دفعة</div>
                            </div>
                            <input type="hidden" id="transType" value="ticket">
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>العملة</label>
                            <select id="currencySelect">
                                <option value="LYD">دينار ليبي (LYD)</option>
                                <option value="EUR">يورو (EUR)</option>
                                <option value="USD">دولار أمريكي (USD)</option>
                            </select>
                        </div>
                        <div id="ticketFields">
                            <div class="form-group"><label>اسم المسافر</label><input type="text" id="passengerName" placeholder="أدخل الاسم"></div>
                            <div class="form-group"><label>رقم المستند</label><input type="text" id="documentNumber" placeholder="رقم التذكرة"></div>
                            <div class="form-group"><label>الوجهة</label><select id="destination"><option value="TIP - IST">TIP - IST</option><option value="other">أخرى</option></select><input type="text" id="otherDest" placeholder="أدخل الوجهة" style="display:none; margin-top:0.5rem;"></div>
                            <div class="form-group"><label>نوع الرحلة</label><select id="tripType"><option>ذهاب</option><option>ذهاب وعودة</option></select></div>
                        </div>
                        <div id="fineFields" style="display:none;">
                            <div class="form-group"><label>سبب الغرامة</label><textarea id="fineReason" rows="2"></textarea></div>
                        </div>
                        <div id="paymentFields" style="display:none;">
                            <div class="form-group"><label>وصف الدفعة</label><input type="text" id="paymentDesc" placeholder="مثال: دفعة شهر أكتوبر"></div>
                        </div>
                        <div class="form-group"><label>المبلغ</label><input type="number" id="amount" step="0.001" min="0"></div>
                        <div class="form-group"><label>التاريخ</label><input type="date" id="transDate"></div>
                        <div class="form-group"><label>ملاحظات</label><input type="text" id="notes" placeholder="اختياري"></div>
                        <button class="btn btn-success" id="saveTransactionBtn" style="width:100%"><i class="fas fa-save"></i> إضافة العملية</button>
                        <button class="btn btn-outline" id="resetFormBtn" style="width:100%; margin-top:0.5rem"><i class="fas fa-undo"></i> مسح</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card"><div class="card-header"><i class="fas fa-list"></i> قائمة الشركات</div><div class="card-body" id="companiesList"></div></div>
    </div>

    <!-- Tab 2: Report -->
    <div class="tab" id="tab-report">
        <div class="card">
            <div class="card-header"><i class="fas fa-chart-line"></i> كشف الحساب</div>
            <div class="card-body">
                <div class="form-grid" style="margin-bottom:1rem">
                    <div class="form-group"><label>اختر الشركة</label><select id="reportCompanySelect"></select></div>
                    <div class="form-group"><label>فلتر العملة</label><select id="reportCurrencyFilter"><option value="all">الكل</option><option value="LYD">دينار</option><option value="EUR">يورو</option><option value="USD">دولار</option></select></div>
                    <div class="form-group"><button class="btn btn-primary" id="printReportBtn"><i class="fas fa-print"></i> طباعة الكشف</button></div>
                </div>
                <div class="table-wrapper">
                    <table id="reportTable">
                        <thead><tr><th>#</th><th>التاريخ</th><th>العملة</th><th>النوع</th><th>الوصف</th><th>المبلغ</th><th>الرصيد التراكمي</th></tr></thead>
                        <tbody id="reportBody"></tbody>
                    </table>
                </div>
                <div id="reportSummary" class="summary-grid"></div>
            </div>
        </div>
    </div>

    <!-- Tab 3: Manage -->
    <div class="tab" id="tab-manage">
        <div class="card">
            <div class="card-header"><i class="fas fa-cogs"></i> إدارة العمليات</div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group"><label>الشركة</label><select id="filterCompany"></select></div>
                    <div class="form-group"><label>النوع</label><select id="filterType"><option value="">الكل</option><option value="ticket">تذكرة</option><option value="fine">غرامة</option><option value="payment">تسليم</option></select></div>
                    <div class="form-group"><label>العملة</label><select id="filterCurrency"><option value="">الكل</option><option value="LYD">دينار</option><option value="EUR">يورو</option><option value="USD">دولار</option></select></div>
                    <div class="form-group"><button class="btn btn-outline" id="resetFiltersBtn"><i class="fas fa-sync-alt"></i> إعادة تعيين</button></div>
                </div>
                <div class="table-wrapper">
                    <table><thead><tr><th>#</th><th>التاريخ</th><th>الشركة</th><th>النوع</th><th>الوصف</th><th>المبلغ</th><th>إجراءات</th></tr></thead><tbody id="manageBody"></tbody></table>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Modals -->
<div id="companyModal" class="modal"><div class="modal-content"><h3><i class="fas fa-building"></i> إضافة شركة جديدة</h3><div class="form-group"><label>اسم الشركة</label><input type="text" id="newCompanyName"></div><div class="form-group"><label>نوع الرصيد الافتتاحي</label><select id="balanceType"><option value="credit">دائن (الشركة تحتاج مني)</option><option value="debit">مدين (أنا محتاج من الشركة)</option></select></div><div class="form-group"><label>المبلغ (دينار ليبي)</label><input type="number" id="initialBalance" step="0.001" value="0"></div><div style="display:flex; gap:0.5rem; margin-top:1rem"><button class="btn btn-success" id="saveCompanyBtn">حفظ</button><button class="btn btn-outline" id="closeCompanyModalBtn">إلغاء</button></div></div></div>

<script>
    // ---------- DATA ----------
    let companies = {};
    let transactions = [];

    // ---------- HELPERS ----------
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
    function formatNumber(n, cur) { return Math.abs(n).toFixed(3) + ' ' + (cur === 'LYD' ? 'د.ل' : cur === 'EUR' ? '€' : '$'); }
    function getTypeName(type) { return { ticket: 'تذكرة', fine: 'غرامة', payment: 'تسليم', cancel: 'إلغاء', initial: 'افتتاحي' }[type] || type; }
    function showToast(msg, isError = false) { let t = document.createElement('div'); t.className = 'toast'; t.style.borderRightColor = isError ? '#EF4444' : '#10B981'; t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function saveToLocal() { localStorage.setItem('tarek_companies', JSON.stringify(companies)); localStorage.setItem('tarek_transactions', JSON.stringify(transactions)); updateStats(); updateAllDropdowns(); renderCompaniesList(); }
    function loadFromLocal() { let c = localStorage.getItem('tarek_companies'); let t = localStorage.getItem('tarek_transactions'); if (c) companies = JSON.parse(c); if (t) transactions = JSON.parse(t); if (Object.keys(companies).length === 0) initSampleData(); }
    function initSampleData() {
        companies = { "شركة الطيران الوطنية": { LYD: 1500, EUR: 500, USD: 0 }, "وكالة السفر العالمية": { LYD: -800, EUR: 200, USD: 300 } };
        transactions = [
            { id: generateId(), date: new Date().toISOString().split('T')[0], type: 'ticket', company: 'شركة الطيران الوطنية', passengerName: 'أحمد علي', documentNumber: 'TKT101', amount: 350, currency: 'LYD', destination: 'TIP - IST', tripType: 'ذهاب', notes: '' },
            { id: generateId(), date: new Date().toISOString().split('T')[0], type: 'payment', company: 'وكالة السفر العالمية', description: 'دفعة أولى', amount: 200, currency: 'EUR', notes: '' }
        ];
        saveToLocal();
    }
    function updateStats() { document.getElementById('totalCompanies').innerText = Object.keys(companies).length; document.getElementById('totalTransactions').innerText = transactions.length; let total = 0; Object.values(companies).forEach(c => total += (c.LYD || 0)); document.getElementById('totalBalance').innerText = total.toFixed(3) + ' د'; }
    function updateAllDropdowns() {
        let companyNames = Object.keys(companies).sort();
        ['companySelect', 'reportCompanySelect', 'filterCompany'].forEach(selId => {
            let sel = document.getElementById(selId); if (!sel) return; let old = sel.value; sel.innerHTML = '<option value="">-- اختر --</option>';
            companyNames.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.textContent = c; if (old === c) opt.selected = true; sel.appendChild(opt); });
        });
    }
    function renderCompaniesList() {
        let container = document.getElementById('companiesList'); if (!container) return;
        if (Object.keys(companies).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد شركات</div>'; return; }
        container.innerHTML = '';
        Object.entries(companies).forEach(([name, data]) => {
            let bal = data.LYD || 0; let div = document.createElement('div'); div.className = 'company-card'; div.style.padding = '0.8rem'; div.style.border = '1px solid #e5e7eb'; div.style.borderRadius = '0.5rem'; div.style.marginBottom = '0.5rem';
            div.innerHTML = `<div style="display:flex; justify-content:space-between"><strong>${name}</strong><span style="color:${bal>=0?'green':'red'}">${formatNumber(Math.abs(bal),'LYD')} ${bal>=0?'دائن':'مدين'}</span></div><button class="btn btn-danger btn-sm delete-company-btn" data-name="${name}" style="margin-top:0.5rem; width:100%">حذف الشركة</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.delete-company-btn').forEach(btn => btn.addEventListener('click', (e) => { let cname = btn.dataset.name; if (confirm(`حذف شركة "${cname}" وجميع عملياتها؟`)) { delete companies[cname]; transactions = transactions.filter(t => t.company !== cname); saveToLocal(); renderCompaniesList(); renderReport(); renderManage(); updateStats(); showToast('تم الحذف'); } }));
    }
    function updateCompanyInfo() {
        let comp = document.getElementById('companySelect').value;
        let infoDiv = document.getElementById('companyInfoBox');
        if (comp && companies[comp]) {
            let bal = companies[comp].LYD || 0;
            document.getElementById('selectedCompanyName').innerText = comp;
            document.getElementById('selectedCompanyBalance').innerHTML = `${formatNumber(Math.abs(bal), 'LYD')} ${bal > 0 ? '(دائن)' : bal < 0 ? '(مدين)' : ''}`;
            infoDiv.style.display = 'block';
        } else infoDiv.style.display = 'none';
    }

    // ---------- ADD TRANSACTION ----------
    function addTransaction() {
        let company = document.getElementById('companySelect').value;
        if (!company) { showToast('اختر شركة أولاً', true); return; }
        let type = document.getElementById('transType').value;
        let currency = document.getElementById('currencySelect').value;
        let amount = parseFloat(document.getElementById('amount').value);
        let date = document.getElementById('transDate').value;
        if (!amount || amount <= 0) { showToast('أدخل مبلغاً صحيحاً', true); return; }
        if (!date) { showToast('اختر التاريخ', true); return; }
        let trans = { id: generateId(), date, type, company, amount, currency, notes: document.getElementById('notes').value };
        if (type === 'ticket') {
            let name = document.getElementById('passengerName').value.trim();
            let doc = document.getElementById('documentNumber').value.trim();
            let dest = document.getElementById('destination').value;
            if (dest === 'other') dest = document.getElementById('otherDest').value.trim();
            if (!name || !doc) { showToast('أكمل بيانات التذكرة', true); return; }
            trans.passengerName = name; trans.documentNumber = doc; trans.destination = dest || 'TIP - IST'; trans.tripType = document.getElementById('tripType').value;
        } else if (type === 'fine') {
            let reason = document.getElementById('fineReason').value.trim();
            if (!reason) { showToast('أدخل سبب الغرامة', true); return; }
            trans.passengerName = document.getElementById('passengerName').value; trans.documentNumber = document.getElementById('documentNumber').value; trans.reason = reason;
        } else if (type === 'payment') {
            let desc = document.getElementById('paymentDesc').value.trim();
            if (!desc) { showToast('أدخل وصف الدفعة', true); return; }
            trans.description = desc;
        }
        if (!companies[company]) companies[company] = { LYD: 0, EUR: 0, USD: 0 };
        if (type === 'ticket' || type === 'fine') companies[company][currency] += amount;
        else if (type === 'payment') companies[company][currency] -= amount;
        transactions.push(trans);
        saveToLocal();
        renderReport();
        renderManage();
        updateCompanyInfo();
        showToast('تمت إضافة العملية بنجاح');
        document.getElementById('amount').value = '';
        document.getElementById('notes').value = '';
    }
    function resetAddForm() { document.getElementById('passengerName').value = ''; document.getElementById('documentNumber').value = ''; document.getElementById('fineReason').value = ''; document.getElementById('paymentDesc').value = ''; document.getElementById('amount').value = ''; document.getElementById('notes').value = ''; document.getElementById('transDate').value = new Date().toISOString().split('T')[0]; document.getElementById('destination').value = 'TIP - IST'; document.getElementById('otherDest').style.display = 'none'; }

    // ---------- REPORT (DESCENDING ORDER) ----------
    function renderReport() {
        let company = document.getElementById('reportCompanySelect').value;
        let currencyFilter = document.getElementById('reportCurrencyFilter').value;
        let filtered = company ? transactions.filter(t => t.company === company) : [...transactions];
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        let tbody = document.getElementById('reportBody'); tbody.innerHTML = '';
        let running = { LYD: 0, EUR: 0, USD: 0 };
        let summaries = { LYD: { tickets: 0, fines: 0, payments: 0, balance: 0 }, EUR: { tickets: 0, fines: 0, payments: 0, balance: 0 }, USD: { tickets: 0, fines: 0, payments: 0, balance: 0 } };
        filtered.forEach((t, idx) => {
            if (t.type === 'ticket' || t.type === 'fine' || t.type === 'initial') running[t.currency] += t.amount;
            else if (t.type === 'payment') running[t.currency] -= t.amount;
            if (t.type === 'ticket') summaries[t.currency].tickets += t.amount;
            if (t.type === 'fine') summaries[t.currency].fines += t.amount;
            if (t.type === 'payment') summaries[t.currency].payments += t.amount;
            summaries[t.currency].balance = running[t.currency];
            let desc = t.passengerName || t.description || t.reason || '-';
            if (currencyFilter !== 'all' && t.currency !== currencyFilter) return;
            let row = `<tr><td>${idx+1}</td><td>${t.date}</td><td><span class="badge">${t.currency}</span></td><td><span class="badge badge-${t.type}">${getTypeName(t.type)}</span></td><td>${desc}</td><td>${formatNumber(t.amount, t.currency)}</td><td>${formatNumber(running[t.currency], t.currency)}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
        let summaryHtml = '';
        for (let [cur, data] of Object.entries(summaries)) { if (data.tickets === 0 && data.fines === 0 && data.payments === 0 && data.balance === 0) continue;
            summaryHtml += `<div class="summary-item"><strong>${cur === 'LYD' ? 'دينار ليبي' : cur === 'EUR' ? 'يورو' : 'دولار'}</strong><br>التذاكر: ${formatNumber(data.tickets, cur)}<br>الغرامات: ${formatNumber(data.fines, cur)}<br>المدفوعات: ${formatNumber(data.payments, cur)}<br><hr><strong>الرصيد: ${formatNumber(data.balance, cur)}</strong></div>`;
        }
        document.getElementById('reportSummary').innerHTML = summaryHtml || '<div class="empty-state">لا توجد عمليات</div>';
    }

    // ---------- MANAGE ----------
    function renderManage() {
        let company = document.getElementById('filterCompany').value;
        let type = document.getElementById('filterType').value;
        let currency = document.getElementById('filterCurrency').value;
        let filtered = transactions.filter(t => (!company || t.company === company) && (!type || t.type === type) && (!currency || t.currency === currency));
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        let tbody = document.getElementById('manageBody'); tbody.innerHTML = '';
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">لا توجد عمليات</td></tr>'; return; }
        filtered.forEach((t, idx) => {
            let desc = t.passengerName || t.description || t.reason || '-';
            let row = `<tr><td>${idx+1}</td><td>${t.date}</td><td>${t.company}</td><td><span class="badge badge-${t.type}">${getTypeName(t.type)}</span></td><td>${desc}</td><td>${formatNumber(t.amount, t.currency)}</td>
            <td><button class="btn btn-sm btn-warning edit-btn" data-id="${t.id}"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-danger cancel-btn" data-id="${t.id}"><i class="fas fa-exchange-alt"></i></button>
            <button class="btn btn-sm btn-danger delete-btn" data-id="${t.id}"><i class="fas fa-trash"></i></button></td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => editTransaction(btn.dataset.id)));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteTransaction(btn.dataset.id)));
        document.querySelectorAll('.cancel-btn').forEach(btn => btn.addEventListener('click', () => cancelTransaction(btn.dataset.id)));
    }
    function editTransaction(id) {
        let trans = transactions.find(t => t.id === id); if (!trans) return;
        let newAmount = prompt('المبلغ الجديد:', trans.amount);
        if (newAmount === null) return;
        let newAmt = parseFloat(newAmount);
        if (isNaN(newAmt) || newAmt <= 0) { showToast('مبلغ غير صالح', true); return; }
        let oldAmt = trans.amount;
        if (trans.type === 'ticket' || trans.type === 'fine') companies[trans.company][trans.currency] = (companies[trans.company][trans.currency] || 0) - oldAmt + newAmt;
        else if (trans.type === 'payment') companies[trans.company][trans.currency] = (companies[trans.company][trans.currency] || 0) + oldAmt - newAmt;
        trans.amount = newAmt;
        saveToLocal(); renderReport(); renderManage(); updateCompanyInfo(); showToast('تم التعديل');
    }
    function deleteTransaction(id) {
        if (!confirm('حذف العملية بشكل دائم؟')) return;
        let idx = transactions.findIndex(t => t.id === id);
        if (idx !== -1) {
            let t = transactions[idx];
            if (t.type === 'ticket' || t.type === 'fine') companies[t.company][t.currency] -= t.amount;
            else if (t.type === 'payment') companies[t.company][t.currency] += t.amount;
            transactions.splice(idx, 1);
            saveToLocal(); renderReport(); renderManage(); updateCompanyInfo(); showToast('تم الحذف');
        }
    }
    function cancelTransaction(id) {
        let orig = transactions.find(t => t.id === id);
        if (!orig || orig.type === 'cancel') { showToast('لا يمكن إلغاء هذه العملية', true); return; }
        if (!confirm(`إلغاء عملية ${getTypeName(orig.type)} بقيمة ${formatNumber(orig.amount, orig.currency)}؟ سيتم إضافة عملية عكسية.`)) return;
        let cancelTrans = { id: generateId(), date: new Date().toISOString().split('T')[0], type: 'cancel', company: orig.company, amount: orig.amount, currency: orig.currency, description: `إلغاء عملية ${getTypeName(orig.type)}` };
        if (orig.type === 'ticket' || orig.type === 'fine') companies[orig.company][orig.currency] -= orig.amount;
        else if (orig.type === 'payment') companies[orig.company][orig.currency] += orig.amount;
        transactions.push(cancelTrans);
        saveToLocal(); renderReport(); renderManage(); updateCompanyInfo(); showToast('تمت إضافة عملية الإلغاء');
    }

    // ---------- PRINT (DESCENDING & TOTAL) ----------
    function printReport() {
        let company = document.getElementById('reportCompanySelect').value;
        let companyName = company || 'جميع الشركات';
        let filtered = company ? transactions.filter(t => t.company === company) : [...transactions];
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        let rows = '';
        let running = { LYD: 0, EUR: 0, USD: 0 };
        let totalByCurr = { LYD: 0, EUR: 0, USD: 0 };
        filtered.forEach(t => {
            if (t.type === 'ticket' || t.type === 'fine' || t.type === 'initial') running[t.currency] += t.amount;
            else if (t.type === 'payment') running[t.currency] -= t.amount;
            totalByCurr[t.currency] = running[t.currency];
            let desc = t.passengerName || t.description || t.reason || '-';
            rows += `<tr><td>${t.date}</td><td>${t.currency}</td><td>${getTypeName(t.type)}</td><td>${desc}</td><td>${formatNumber(t.amount, t.currency)}</td><td>${formatNumber(running[t.currency], t.currency)}</td></tr>`;
        });
        let summaryHtml = `<div style="margin-top:20px;"><h3>ملخص الأرصدة النهائية</h3>`;
        for (let [cur, val] of Object.entries(totalByCurr)) { if (val !== 0) summaryHtml += `<p>${cur === 'LYD' ? 'دينار ليبي' : cur === 'EUR' ? 'يورو' : 'دولار'}: ${formatNumber(val, cur)}</p>`; }
        summaryHtml += `</div>`;
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>كشف حساب ${companyName}</title><style>
                body { font-family: 'Cairo', sans-serif; padding: 20px; } table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid #aaa; padding: 8px; text-align: right; } th { background: #f3f4f6; } .header { text-align: center; margin-bottom: 20px; } @media print { .no-print { display: none; } }
            </style></head><body>
            <div class="header"><h2>TAREK Tickets</h2><h3>كشف حساب: ${companyName}</h3><p>تاريخ الطباعة: ${new Date().toLocaleString('ar-EG')}</p></div>
            <table><thead><tr><th>التاريخ</th><th>العملة</th><th>النوع</th><th>الوصف</th><th>المبلغ</th><th>الرصيد</th></tr></thead><tbody>${rows}</tbody></table>
            ${summaryHtml}
            <div style="margin-top:30px; text-align:center;"><small>نظام إدارة التذاكر الذكي - جميع الحقوق محفوظة</small></div>
            </body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    // ---------- COMPANY MODAL ----------
    function openCompanyModal() { document.getElementById('companyModal').classList.add('active'); }
    function closeCompanyModal() { document.getElementById('companyModal').classList.remove('active'); }
    function saveNewCompany() {
        let name = document.getElementById('newCompanyName').value.trim();
        if (!name) { showToast('أدخل اسم الشركة', true); return; }
        if (companies[name]) { showToast('الشركة موجودة مسبقاً', true); return; }
        let balType = document.getElementById('balanceType').value;
        let amount = parseFloat(document.getElementById('initialBalance').value) || 0;
        let opening = (balType === 'credit') ? amount : -amount;
        companies[name] = { LYD: opening, EUR: 0, USD: 0 };
        if (amount > 0) {
            transactions.push({ id: generateId(), date: new Date().toISOString().split('T')[0], type: 'initial', company: name, amount: amount, currency: 'LYD', description: `رصيد افتتاحي ${balType === 'credit' ? 'دائن' : 'مدين'}` });
        }
        saveToLocal(); closeCompanyModal(); document.getElementById('newCompanyName').value = ''; document.getElementById('initialBalance').value = '0'; renderCompaniesList(); renderReport(); renderManage(); showToast('تمت إضافة الشركة');
    }

    // ---------- EVENT LISTENERS ----------
    function bindEvents() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active'); if (btn.dataset.tab === 'report') renderReport(); if (btn.dataset.tab === 'manage') renderManage(); }));
        document.querySelectorAll('.type-option').forEach(opt => opt.addEventListener('click', () => { document.querySelectorAll('.type-option').forEach(o => o.classList.remove('active')); opt.classList.add('active'); let type = opt.dataset.type; document.getElementById('transType').value = type; document.getElementById('ticketFields').style.display = (type === 'payment') ? 'none' : 'block'; document.getElementById('fineFields').style.display = (type === 'fine') ? 'block' : 'none'; document.getElementById('paymentFields').style.display = (type === 'payment') ? 'block' : 'none'; }));
        document.getElementById('destination').addEventListener('change', function() { document.getElementById('otherDest').style.display = this.value === 'other' ? 'block' : 'none'; });
        document.getElementById('companySelect').addEventListener('change', updateCompanyInfo);
        document.getElementById('saveTransactionBtn').addEventListener('click', addTransaction);
        document.getElementById('resetFormBtn').addEventListener('click', resetAddForm);
        document.getElementById('openCompanyModalBtn').addEventListener('click', openCompanyModal);
        document.getElementById('closeCompanyModalBtn').addEventListener('click', closeCompanyModal);
        document.getElementById('saveCompanyBtn').addEventListener('click', saveNewCompany);
        document.getElementById('printReportBtn').addEventListener('click', printReport);
        document.getElementById('reportCompanySelect').addEventListener('change', () => renderReport());
        document.getElementById('reportCurrencyFilter').addEventListener('change', () => renderReport());
        document.getElementById('filterCompany').addEventListener('change', () => renderManage());
        document.getElementById('filterType').addEventListener('change', () => renderManage());
        document.getElementById('filterCurrency').addEventListener('change', () => renderManage());
        document.getElementById('resetFiltersBtn').addEventListener('click', () => { document.getElementById('filterCompany').value = ''; document.getElementById('filterType').value = ''; document.getElementById('filterCurrency').value = ''; renderManage(); });
    }

    // ---------- INIT ----------
    function init() {
        loadFromLocal();
        updateAllDropdowns();
        renderCompaniesList();
        renderReport();
        renderManage();
        updateStats();
        bindEvents();
        document.getElementById('transDate').value = new Date().toISOString().split('T')[0];
    }
    init();
</script>
</body>
</html>
