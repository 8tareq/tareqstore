<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAREK Tickets - نظام إدارة التذاكر الذكي</title>
    <style>
        :root {
            /* نظام ألوان جديد عصري */
            --primary: #7C3AED;
            --primary-light: #8B5CF6;
            --primary-dark: #6D28D9;
            --secondary: #10B981;
            --secondary-light: #34D399;
            --secondary-dark: #059669;
            --accent: #F59E0B;
            --accent-light: #FBBF24;
            --accent-dark: #D97706;
            --danger: #EF4444;
            --danger-light: #F87171;
            --danger-dark: #DC2626;
            --warning: #F97316;
            --success: #10B981;
            --info: #3B82F6;
            
            /* تدرجات رمادية */
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            /* تدرجات داكنة */
            --dark-1: #1A1A2E;
            --dark-2: #16213E;
            --dark-3: #0F3460;
            
            /* ألوان العملات */
            --lyd: #059669;
            --eur: #2563EB;
            --usd: #DC2626;
            
            /* ظلال متطورة */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            
            /* زوايا دائرية */
            --radius-sm: 8px;
            --radius: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* تأثيرات الحركة */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
            
            /* تدرجات لونية */
            --gradient-primary: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            --gradient-secondary: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            --gradient-accent: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            --gradient-danger: linear-gradient(135deg, var(--danger) 0%, var(--danger-light) 100%);
            --gradient-dark: linear-gradient(135deg, var(--dark-1) 0%, var(--dark-2) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }

        body {
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متطورة */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
        }

        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            background-image: 
                radial-gradient(var(--primary) 1px, transparent 1px),
                radial-gradient(var(--secondary) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        /* ترويسة جديدة */
        .header {
            background: var(--gradient-dark);
            color: white;
            padding: 1.5rem 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            border-bottom: 4px solid var(--primary);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: translateX(100%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .logo::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: logo-shine 6s infinite linear;
        }

        @keyframes logo-shine {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, white, var(--gray-200));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            color: var(--gray-300);
            font-size: 0.9rem;
        }

        .header-stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition);
        }

        .stat-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--gray-300);
        }

        /* تنقل جديد */
        .nav-container {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            gap: 0.5rem;
        }

        .nav-tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--gray-600);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 3px;
            background: var(--gradient-primary);
            transition: var(--transition);
        }

        .nav-tab:hover {
            color: var(--primary);
            background: var(--gray-50);
        }

        .nav-tab:hover::after {
            width: 100%;
        }

        .nav-tab.active {
            color: var(--primary);
        }

        .nav-tab.active::after {
            width: 100%;
        }

        .nav-tab i {
            font-size: 1.2rem;
        }

        /* المحتوى الرئيسي */
        .main-content {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* بطاقات جديدة */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            background: linear-gradient(to right, var(--gray-50), white);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title i {
            color: var(--primary);
        }

        .card-body {
            padding: 1.5rem;
        }

        /* نموذج جديد */
        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: var(--primary);
        }

        .form-input, .form-select, .form-textarea {
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: var(--transition);
            background: white;
            color: var(--gray-800);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--gray-400);
        }

        /* أزرار جديدة */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: var(--gradient-secondary);
            color: white;
        }

        .btn-success:hover {
            background: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-warning {
            background: var(--gradient-accent);
            color: white;
        }

        .btn-warning:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-danger {
            background: var(--gradient-danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* بطاقات الشركات */
        .company-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--gray-200);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .company-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--gradient-primary);
            transition: width 0.3s;
        }

        .company-card:hover::before {
            width: 8px;
        }

        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .company-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .company-balance {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            background: var(--gray-100);
        }

        .company-balance.positive {
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .company-balance.negative {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* أزرار العملية */
        .transaction-type-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .type-btn {
            padding: 1.5rem 1rem;
            border: 2px solid var(--gray-200);
            background: white;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .type-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-primary);
            opacity: 0;
            transition: var(--transition);
        }

        .type-btn.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.05), transparent);
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .type-btn.active::before {
            opacity: 0.05;
        }

        .type-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--gray-600);
            position: relative;
            z-index: 1;
        }

        .type-btn.active .type-icon {
            color: var(--primary);
        }

        .type-label {
            font-weight: 600;
            color: var(--gray-700);
            position: relative;
            z-index: 1;
        }

        .type-btn.active .type-label {
            color: var(--primary);
        }

        /* الجداول الجديدة */
        .table-container {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: linear-gradient(to right, var(--gray-50), var(--gray-100));
        }

        .table th {
            padding: 1rem;
            text-align: right;
            font-weight: 600;
            color: var(--gray-700);
            border-bottom: 2px solid var(--gray-200);
            white-space: nowrap;
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid var(--gray-200);
            color: var(--gray-700);
        }

        .table tbody tr {
            transition: var(--transition);
        }

        .table tbody tr:hover {
            background: var(--gray-50);
        }

        /* شارات العمليات */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-ticket {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge-fine {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-payment {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
        }

        .badge-cancel {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .badge-initial {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        /* شارات العملات */
        .currency-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .currency-badge.lyd {
            background: rgba(5, 150, 105, 0.1);
            color: var(--lyd);
        }

        .currency-badge.eur {
            background: rgba(37, 99, 235, 0.1);
            color: var(--eur);
        }

        .currency-badge.usd {
            background: rgba(220, 38, 38, 0.1);
            color: var(--usd);
        }

        /* أزرار الإجراءات */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem;
            border: none;
            border-radius: var(--radius);
            background: var(--gray-100);
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--gray-200);
            color: var(--gray-800);
        }

        .action-btn.edit:hover {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .action-btn.cancel:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        /* فلاتر */
        .filter-container {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* ملخص العمليات */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .summary-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
        }

        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .summary-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .summary-icon.lyd {
            background: rgba(5, 150, 105, 0.1);
            color: var(--lyd);
        }

        .summary-icon.eur {
            background: rgba(37, 99, 235, 0.1);
            color: var(--eur);
        }

        .summary-icon.usd {
            background: rgba(220, 38, 38, 0.1);
            color: var(--usd);
        }

        .summary-title {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }

        .summary-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--gray-900);
        }

        /* تذييل الصفحة */
        .footer {
            margin-top: 4rem;
            padding: 2rem;
            background: var(--dark-1);
            color: white;
            text-align: center;
            border-top: 4px solid var(--primary);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer p {
            color: var(--gray-400);
            margin-top: 0.5rem;
        }

        /* نافذة منبثقة جديدة */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            transform: scale(0.95);
            transition: transform var(--transition);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, var(--gray-50), white);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-500);
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--gray-100);
            color: var(--danger);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* تنسيق خاص للهواتف */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }

            .logo-section {
                flex-direction: column;
                text-align: center;
            }

            .header-stats {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav {
                flex-direction: column;
                padding: 0;
            }

            .nav-tab {
                padding: 1rem;
                justify-content: center;
            }

            .main-content {
                padding: 0 1rem;
            }

            .form-container {
                grid-template-columns: 1fr;
            }

            .transaction-type-buttons {
                grid-template-columns: 1fr;
            }

            .table {
                display: block;
                overflow-x: auto;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* تحسينات للطابعة */
        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white;
                color: black;
            }

            .card, .table-container {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }

        /* مؤشر التحميل */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* رسائل التنبيه */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--info);
        }

        /* مؤشر شرطات */
        .tab-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            transition: all var(--transition);
        }

        /* إشعارات */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1001;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تلميحات */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            right: 50%;
            transform: translateX(50%);
            background: var(--gray-800);
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 100;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: 120%;
        }

        /* تصميم شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: var(--radius);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-400);
            border-radius: var(--radius);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- خلفية متطورة -->
    <div class="background-overlay"></div>
    <div class="background-pattern"></div>

    <!-- الترويسة الجديدة -->
    <header class="header no-print">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo">
                    <i class="fas fa-plane-departure"></i>
                </div>
                <div class="logo-text">
                    <h1>TAREK Tickets</h1>
                    <p>نظام إدارة التذاكر الذكي</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-companies">0</div>
                    <div class="stat-label">شركة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-transactions">0</div>
                    <div class="stat-label">عملية</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-balance">0 د</div>
                    <div class="stat-label">إجمالي الرصيد</div>
                </div>
            </div>
        </div>
    </header>

    <!-- شريط التنقل الجديد -->
    <nav class="nav-container no-print">
        <div class="nav">
            <div class="tab-indicator" id="tab-indicator"></div>
            <button class="nav-tab active" data-tab="add">
                <i class="fas fa-plus-circle"></i>
                إضافة عملية
            </button>
            <button class="nav-tab" data-tab="report">
                <i class="fas fa-chart-line"></i>
                كشف الحساب
            </button>
            <button class="nav-tab" data-tab="manage">
                <i class="fas fa-cogs"></i>
                إدارة العمليات
            </button>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="main-content">
        <!-- تبويب إضافة عملية -->
        <div class="tab-content active" id="add-tab">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-plus-circle"></i>
                        إضافة عملية جديدة
                    </h2>
                </div>
                <div class="card-body">
                    <!-- لاحظ أن نفس الهيكل موجود هنا، فقط بتصميم جديد -->
                    <!-- سيتم تعبئته بنفس الكود الجافاسكريبت -->
                    <div id="add-form-container">
                        <!-- نفس المحتوى السابق ولكن بتصميم جديد -->
                    </div>
                </div>
            </div>
        </div>

        <!-- تبويب كشف الحساب -->
        <div class="tab-content" id="report-tab">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-chart-line"></i>
                        كشف الحساب
                    </h2>
                </div>
                <div class="card-body">
                    <!-- نفس المحتوى السابق -->
                </div>
            </div>
        </div>

        <!-- تبويب إدارة العمليات -->
        <div class="tab-content" id="manage-tab">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-cogs"></i>
                        إدارة العمليات
                    </h2>
                </div>
                <div class="card-body">
                    <!-- نفس المحتوى السابق -->
                </div>
            </div>
        </div>
    </main>

    <!-- تذييل الصفحة -->
    <footer class="footer no-print">
        <div class="footer-content">
            <p>TAREK Tickets - نظام إدارة التذاكر الذكي</p>
            <p>جميع الحقوق محفوظة &copy; 2024</p>
        </div>
    </footer>

    <!-- إضافة الكود الجافاسكريبت هنا -->
    <script>
        // نقل كود الجافاسكريبت هنا مع تعديلات طفيفة لتتناسب مع التصميم الجديد
        // سيحتوي على نفس الوظائف والبيانات
        
        // تحميل البيانات من localStorage
        let transactions = JSON.parse(localStorage.getItem('ticketSystem_transactions_multi')) || [];
        let companies = JSON.parse(localStorage.getItem('ticketSystem_companies_multi')) || {};

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('total-companies').textContent = Object.keys(companies).length;
            document.getElementById('total-transactions').textContent = transactions.length;
            
            let totalBalance = 0;
            Object.values(companies).forEach(company => {
                totalBalance += (company.LYD || 0);
                // يمكن إضافة تحويل عملات هنا إذا أردت
            });
            
            document.getElementById('total-balance').textContent = totalBalance.toFixed(3) + ' د';
        }

        // تهيئة التطبيق
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            
            // إدارة التنقل بين التبويبات
            const tabs = document.querySelectorAll('.nav-tab');
            const tabContents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.dataset.tab;
                    
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}-tab`) {
                            content.classList.add('active');
                        }
                    });
                    
                    // تحديث مؤشر التبويب
                    updateTabIndicator(tab);
                });
            });
            
            function updateTabIndicator(activeTab) {
                const indicator = document.getElementById('tab-indicator');
                const tabRect = activeTab.getBoundingClientRect();
                const navRect = activeTab.parentElement.getBoundingClientRect();
                
                indicator.style.width = tabRect.width + 'px';
                indicator.style.transform = `translateX(${tabRect.right - navRect.right}px)`;
            }
            
            // تهيئة مؤشر التبويب
            const activeTab = document.querySelector('.nav-tab.active');
            if (activeTab) {
                updateTabIndicator(activeTab);
            }
            
            // تحديث عند تغيير حجم النافذة
            window.addEventListener('resize', () => {
                const activeTab = document.querySelector('.nav-tab.active');
                if (activeTab) {
                    updateTabIndicator(activeTab);
                }
            });
        });

        // هنا سيتم نقل بقية كود الجافاسكريبت مع تعديلات طفيفة للتحكم في العناصر الجديدة
        // الحفاظ على جميع الدوال والمتغيرات كما هي مع استبدال أسماء الفئات عند الضرورة
    </script>
</body>
</html>
